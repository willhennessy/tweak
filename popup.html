<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tweak</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Tweak</h1>
        <button id="options-btn" title="Settings" aria-label="Open settings">
          &#9881;
        </button>
      </header>

      <div class="input-section">
        <textarea
          id="prompt-input"
          placeholder="Describe a change to this page..."
          rows="2"
          autofocus
        ></textarea>
        <div class="btn-row">
          <button id="pick-btn">Select region</button>
          <button id="apply-btn">Apply to page</button>
          <button id="extract-btn">Extract</button>
        </div>
        <div id="extract-result" class="extract-result hidden"></div>
      </div>

      <div id="feedback-row" class="feedback-row hidden">
        <span class="feedback-label">Did it work?</span>
        <button id="feedback-up" class="feedback-btn feedback-up" title="Yes">
          &#128077;
        </button>
        <button
          id="feedback-down"
          class="feedback-btn feedback-down"
          title="No"
        >
          &#128078;
        </button>
      </div>

      <div id="status" class="status hidden"></div>

      <div id="tab-active">
        <ul id="tweaks-list" class="item-list"></ul>
        <p id="tweaks-empty" class="empty-msg hidden">
          No tweaks for this site yet.
        </p>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
